  <body style="margin:0;background:#0a0e27">

    <script>
      // JSモジュール読み込みエラーのキャッチ
      window.addEventListener('error', function(e) {
        var el = document.getElementById('loading-fallback');
        if (el) {
          el.innerHTML = '<div><div style="color:#ef4444;font-size:16px;margin-bottom:12px">JS Error</div><div style="font-size:12px;color:#888;word-break:break-word;max-width:300px">' + (e.message || 'Unknown error') + '</div></div>';

      });
    </script>
